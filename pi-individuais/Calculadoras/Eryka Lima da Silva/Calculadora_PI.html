    Quantos Kg você vende (mês)? <input id="ipt_quantidade"> <br><br>

    <b>Calculando a tava de desperdicio</b> <br>
    <div id="div_msg"></div
    
</body>

<script>

    function depositar() {
            let tipo = Number(ipt_preco.value);
            let kg = Number(ipt_quantidade.value);
            let def = (2);
            let total = tipo * kg;
            let resultado = ((total * 2)/100);


            div_msg.innerHTML = `VOCÊ VENDE ${ipt_carne.value}. E DELA, A TAXA DE DESPERDICIO É DE  2% ONDE, ESSE VALOR EQUIVALE A R$ ${resultado} DE PREJUÍZO FINANCEIRO.`
            ipt_preco.value = '';
            ipt_carne.value = '';
            ipt_quantidade.value = '';
        }


</script>
