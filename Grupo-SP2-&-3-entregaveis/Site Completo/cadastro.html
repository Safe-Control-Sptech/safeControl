<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./CSS/cadastro.css">
    
    <title>Cadastro - SAFE_CONTROL</title>
</head>

<body>
    <div class="header">
        <button class="voltar"><a class="link-voltar" href="./Site.html">Voltar</a></button>

        <div class="logo">
            <img class="img-logo" src="./logo/Logo_SafeControl_Horizontal.png" alt="Imagem da Logo da Safe Control">
        </div>
    </div>

    <div class="main">
        <div class="formulario">
            <h2>Cadastro</h2>
            
            <div class="form">    
                <div class="form-inputs">
                    <h3>Email: </h3>
                    <input type="text" id="ipt_email">
                </div>

                <div class="form-inputs">
                    <h3>Senha: </h3>
                    <input type="text" id="ipt_senha">
                </div>

                <div class="form-inputs">
                    <h3>Confirme a Senha: </h3>
                    <input type="text" id="ipt_confirme">
                </div>

                <p>Já tem conta? Então entre agora <a href="./login.html">clique aqui</a></p>
                <button class="entrar" onclick="Criar()"><a class="link-entrar">Cadastrar</a></button>
            </div>
        </div>
        
        <div class="banner"></div>
    </div>
</body>

</html>
<script src="./JS/cadastroElogin.js"></script>
