<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./CSS/login.css">

    <script src="cadastro.js"></script>

    <title>Login SAFE_CONTROL</title>
</head>

<body>
    <div class="header">
        <button class="voltar"><a class="link-voltar" href="./Site.html">Voltar</a></button>

        <div class="logo">
            <img class="img-logo" src="./logo/Logo_SafeControl_Horizontal.png" alt="Imagem da Logo da Safe Control">
        </div>
    </div>

    <div class="main">
        <div class="banner"></div>
        
        <div class="formulario">
            <h2>Login</h2>
            
            <div class="form">    
                <div class="form-inputs">
                    <h3>Email: </h3>
                    <input type="text" id="ipt_Email">
                </div>

                <div class="form-inputs">
                    <h3>Senha: </h3>
                    <input type="text" id="ipt_Senha">
                </div>

                <p>Não tem conta? Inscreva-se agora <a href="./cadastro.html">clique aqui</a></p>
                <button class="entrar" onclick="verificar()"><a class="link-entrar" href="./dashboard.html">Entrar</a></button>
            </div>
        </div>
    </div>
</body>
</html>
