<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./CSS/cadastro_login.css">


    <title>SafeControl | Login</title>
</head>

<body>
    <div class="header">
        <div class="logo">
            <img class="img-logo" src="./logo/Logo_SafeControl_Horizontal.png" alt="Imagem da Logo da Safe Control">
        </div>
        
        <button class="voltar"><a class="link-voltar" href="./Site.html">Voltar</a></button>
    </div>

    <div class="main">        
        <div class="formulario">
            <div class="form">  
                <h2>Login</h2>
                <div style="color: red;" id="msg_Erro"></div>

                <div class="form-inputs">
                    <h3>Email: </h3>
                    <input type="text" id="ipt_email" placeholder="email@provedor.com">
                </div>

                <div class="form-inputs">
                    <h3>Senha: </h3>
                    <input type="password" id="ipt_senha" placeholder="********">
                </div>

                <p>Não tem uma conta? Inscreva-se agora: <a class="link-entrar" href="./cadastro.html">Clique aqui!</a></p>
                <button class="entrar" onclick="entrar()"><a class="texto-botao">Entrar</a></button>
            </div>
        </div>
    </div>
</body>
<script src="./JS/cadastroElogin.js"></script>
</html>
