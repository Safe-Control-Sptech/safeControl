<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./CSS/login.css">

    <title>Login SAFE_CONTROL</title>
</head>

<style>
    body{
        overflow: hidden;
    }

    .main{
        height: auto;
    }

    .formulario{
        height: 600px;
    }

    .banner{
        height: 600px;
    }

    .banner_cadastro{
        height: 600px;
    }
</style>

<body>
    <div class="header">
        <button class="voltar"><a class="link-voltar" href="./Site.html">Voltar</a></button>

        <div class="logo">
            <img class="img-logo" src="./logo/Logo_SafeControl_Horizontal.png" alt="Imagem da Logo da Safe Control">
        </div>
    </div>

    <div class="main" id="tela_login">
        <div class="banner"></div>

        <div class="formulario">
            <h2>Login</h2>

            <div class="form">
                <div class="form-inputs">
                    <h3>Email: </h3>
                    <input type="text" id="ipt_email">
                </div>

                <div class="form-inputs">
                    <h3>Senha: </h3>
                    <input type="text" id="ipt_senha">
                </div>

                <p>Não tem conta? Inscreva-se agora <button onclick="ocultar_login()">clique aqui</button></p>
                <button class="entrar" onclick="entrar()">Entrar <!-- <<a class="link-entrar">/a> --></button>
            </div>
        </div>
    </div>

    <div class="main" id="tela_cadastro" style="display: none;">
        <div class="banner_cadastro"></div>

        <div class="formulario">
            <h2>Cadastro</h2>

            <div class="form">
                <div class="form-inputs">
                    <h3>Email: </h3>
                    <input type="text" id="ipt_email">
                </div>

                <div class="form-inputs">
                    <h3>Senha: </h3>
                    <input type="text" id="ipt_senha">
                </div>

                <div class="form-inputs">
                    <h3>Confirme a Senha: </h3>
                    <input type="text" id="ipt_confirme">
                </div>

                <p>Já tem conta? Então entre agora <button onclick="ocultar_cadastro()">clique aqui</button></p>
                <button class="entrar" onclick="criar()">Cadastrar<!--a class="link-entrar" ></a>--></button>
            </div>
        </div>
    </div>
</body>
