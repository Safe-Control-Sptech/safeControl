<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador financeiro</title>
</head>

<body>
    <h1>Simulador financeiro</h1>
    <h4>Sprint 1</h4>

    Qual o preço, em média, do kilo que você vende?
    <input id="ipt_Precokg" type="text">
    Quantos Kilos, em média, você vende por mês?
    <input id="ipt_KgVendidos" type="text">
    <br>
    
    <button onclick="Mostrar()">Calcular taxa de disperdício</button>

    <div id="msg"></div>

</body>

</html>
<script>
    function Mostrar() {
        let PrecoKilo = Number(ipt_Precokg.value)
        let KgVendidos = Number(ipt_KgVendidos.value)

        let faturamento = (PrecoKilo * KgVendidos)
        let taxaDesperdicio = faturamento * 0.02
        let desperdicioAnual = taxaDesperdicio * 12

        let economia = desperdicioAnual * 0.7

        msg.innerHTML = `A taxa média de desperdício de alimentos altamente perecíveis é de 2 % , de acordo com a Organizaçaõ das Nações Unidas<br> <br>

             💸 Perda mensal estimada: R$ ${taxaDesperdicio.toFixed(2)} <br>
                💸 Perda anual estimada: R$ ${desperdicioAnual.toFixed(2)} <br><br>

                     🛠️Com o nosso sistema, as perdas podem ser reduzidas em até <b>70%</b>.<br>
                        💰 Economia anual potencial: <b>R$ ${economia.toFixed(2)}</b>`
    }
</script>

<!-- 
0.7 significa 70% de economia que cremos que podemos oferecer ao cliente
valores: 
- 50 reais por Kg e 700 Kg vendidos por mês
-->
